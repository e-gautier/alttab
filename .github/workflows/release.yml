name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxkbcommon-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Build release binary
        run: cargo build --release

      - name: Strip binary
        run: strip target/release/alttab

      - name: Get binary info
        run: |
          ls -lh target/release/alttab
          file target/release/alttab

      - name: Create tarball
        run: |
          cd target/release
          tar czf alttab-${GITHUB_REF_NAME}-linux-x86_64.tar.gz alttab
          sha256sum alttab-${GITHUB_REF_NAME}-linux-x86_64.tar.gz > alttab-${GITHUB_REF_NAME}-linux-x86_64.tar.gz.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            target/release/alttab-*-linux-x86_64.tar.gz
            target/release/alttab-*-linux-x86_64.tar.gz.sha256

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
